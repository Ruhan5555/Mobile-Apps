kind = "mobile"
previewPath = "/"
title = "Car Sales Management App"
version = "1.0.0"
id = "artifacts/car-sales-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24204

[services.development]
run = "pnpm --filter @workspace/car-sales-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-sales-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/car-sales-app", "run", "serve" ]

[services.env]
PORT = "24204"
BASE_PATH = "/"
